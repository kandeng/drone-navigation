# Define the HTTPS port Squid listens on.
# Replace the certificate paths with your own Let's Encrypt or custom TLS files.
https_port 3128 \
    tls-cert=/etc/squid/certs/www.drone-navigation.com.crt \
    tls-key=/etc/squid/certs/www.drone-navigation.com.key

# -----------------------------------------------------------------------------
# AUTHENTICATION ENGINE
# -----------------------------------------------------------------------------
# Use Squid's native NCSA helper to validate credentials against /etc/squid/passwords
auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwords
auth_param basic children 5 startup=1 idle=1
auth_param basic realm "Drone Navigation Secure Proxy"
auth_param basic credentialsttl 2 hours

# Require authenticated users
acl authenticated_users proxy_auth REQUIRED

# -----------------------------------------------------------------------------
# ACCESS RULES (order matters)
# -----------------------------------------------------------------------------
# 1. Allow authenticated traffic
http_access allow authenticated_users

# 2. Deny everything else
http_access deny all

# System directives
coredump_dir /var/spool/squid
access_log daemon:/var/log/squid/access.log squid
