<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>3D Drone Aerial</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Preload splash video clips to avoid black screen between transitions -->
    <link rel="preload" href="/splash/video_00.mp4" as="video" type="video/mp4">
    <link rel="preload" href="/splash/vantor_world3d.mp4" as="video" type="video/mp4">
    <link rel="preload" href="/splash/kevtoe_worldview.mp4" as="video" type="video/mp4">
</head>
<body>
    <div id="cesiumContainer"></div>

    <!-- Vue 3 application overlay -->
    <div id="app"></div>

    <!-- Splash screen: full-screen overlay with sequential video clips -->
    <div id="splash-overlay">
        <video id="splash-video" muted playsinline autoplay preload="auto"></video>
        <div id="splash-progress"></div>
        <div id="splash-bottom">
            <p id="splash-slogan"></p>
            <div id="splash-qr">
                <img id="splash-qr-img" alt="Download PWA" />
            </div>
        </div>
    </div>

    <script src="/splash.js"></script>
    <script type="module" src="src/cesium-main.js"></script>
    <script src="src/dronePhysics.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
